name: Dependency Bot Auto-Merge

on:
  pull_request:
    types: [opened]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-merge:
    name: Approve and Auto-Merge
    if: >-
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.user.type == 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.pull_request.user.login == 'renovate-rancher[bot]' &&
         startsWith(github.event.pull_request.head.ref, 'renovate/')) ||
        (github.event.pull_request.user.login == 'dependabot[bot]' &&
         startsWith(github.event.pull_request.head.ref, 'dependabot/'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Read App Secrets
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/workflow-dispatcher/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/workflow-dispatcher/app-credentials privateKey | PRIVATE_KEY

      - name: Create App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            fleet
          permission-contents: write
          permission-pull-requests: write

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          review_state=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')

          if [[ "$review_state" -gt 0 ]]; then
            echo "PR already has an approval review."
            exit 0
          fi

          gh pr review "$PR_NUMBER" \
            --repo "$REPO" \
            --approve \
            --body "Auto-approving dependency bot PR."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          auto_merge_enabled=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json autoMergeRequest --jq '.autoMergeRequest != null')

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash