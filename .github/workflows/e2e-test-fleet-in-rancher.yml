# Test fleet in Rancher with MC tests
name: Test Fleet in Rancher

on:
  schedule:
    # Run everyday at 1:00 PM
    - cron:  '0 13 * * *'
  workflow_dispatch:
    inputs:
      charts_repo:
        description: Repository from which to source Fleet charts
        required: true
        default: "fleetrepoci/charts"
        type: string
      charts_branch:
        description: Branch from which to source Fleet charts
        required: true
        default: "dev-v2.14"
        type: string
  push:
    tags: [ 'v*' ]
    paths-ignore:
      - '*.md'

env:
  GOARCH: amd64
  CGO_ENABLED: 0
  SETUP_K3S_VERSION: 'v1.36.0-rc3-k3s1'

jobs:
  release-against-test-charts:
    uses: ./.github/workflows/release-against-test-charts.yml
    with:
      charts_repo: ${{ github.event.inputs.charts_repo }}
      charts_base_branch: ${{ github.event.inputs.charts_branch }}
    secrets: inherit # needed to enable access to repo secrets from the called workflow

  rancher-integration:
    runs-on: ubuntu-latest
    needs: release-against-test-charts

    steps:
      -
        name: Add paths into PATH
        run: |
          export PATH=~/.local/bin:$PATH
          mkdir -p ~/.local/bin

      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: fleet

      -
        name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "fleet/go.mod"

      -
        name: Install Ginkgo CLI
        run: |
          cd fleet
          go install github.com/onsi/ginkgo/v2/ginkgo

      -
        name: Cache crust-gather CLI
        id: cache-crust
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.local/bin/crust-gather
          key: ${{ runner.os }}-crust-gather-${{ hashFiles('./fleet/.github/scripts/install-crust-gather.sh') }}
          restore-keys: |
            ${{ runner.os }}-crust-gather-
      -
        name: Install crust-gather CLI
        run: |
          if [ "${{ steps.cache-crust.outputs.cache-hit }}" != "true" ]; then
            ./fleet/.github/scripts/install-crust-gather.sh
          else
            echo "Using cached crust-gather CLI"
            chmod +x ~/.local/bin/crust-gather
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      -
        name: Set up build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: rancher-cli-cache
        with:
          path: ~/.local/bin/rancher
          key: ${{ runner.os }}-rancher-cli-${{ hashFiles('./fleet/.github/workflows/e2e-test-fleet-in-rancher.yml') }}

      -
        name: Cache kubectl and helm
        id: deps-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.local/bin/kubectl
            ~/.local/bin/helm
          key: ${{ runner.os }}-deps-${{ hashFiles('./fleet/.github/workflows/e2e-test-fleet-in-rancher.yml') }}

      -
        name: Install Dependencies
        run: |
          mkdir -p ~/.local/bin
          if [ "${{ steps.deps-cache.outputs.cache-hit }}" != "true" ]; then
            # renovate: datasource=github-releases depName=kubernetes/kubernetes
            KUBECTL_VERSION="v1.36.0"
            # renovate: datasource=github-release-attachments depName=kubernetes/kubernetes digestVersion=v1.36.0
            KUBECTL_SUM_amd64="fd31c7d7129260e608f6faf92d5984c3267ad0b5ead3bced2fe125686e286ad6"
            curl -sSfL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
            echo "${KUBECTL_SUM_amd64}  kubectl" | sha256sum -c -
            mv kubectl ~/.local/bin/
            chmod +x ~/.local/bin/kubectl

            HELM_VERSION="v4.1.3"
            HELM_SUM_amd64="02ce9722d541238f81459938b84cf47df2fdf1187493b4bfb2346754d82a4700"
            curl -sSfL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
            echo "${HELM_SUM_amd64}  helm.tar.gz" | sha256sum -c -
            tar -xzf helm.tar.gz linux-amd64/helm
            mv linux-amd64/helm ~/.local/bin/
          fi

      -
        name: Install Rancher CLI
        if: steps.rancher-cli-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          # renovate: datasource=github-releases depName=rancher/cli
          RANCHER_CLI_VERSION="v2.14.0"
          # renovate: datasource=github-release-attachments depName=rancher/cli digestVersion=v2.14.0
          RANCHER_CLI_SUM_amd64="d05e207d9830f22171e62801dc51a32417125ecb7aaf50c073bf423e7da36a94"
          curl -fsSL -o "rancher-linux-amd64-${RANCHER_CLI_VERSION}.tar.gz" \
            "https://github.com/rancher/cli/releases/download/${RANCHER_CLI_VERSION}/rancher-linux-amd64-${RANCHER_CLI_VERSION}.tar.gz"
          echo "${RANCHER_CLI_SUM_amd64}  rancher-linux-amd64-${RANCHER_CLI_VERSION}.tar.gz" | sha256sum -c -
          tar -xz --strip-components=2 -f "rancher-linux-amd64-${RANCHER_CLI_VERSION}.tar.gz" -C ~/.local/bin

      -
        name: Cache k3d CLI
        id: cache-k3d
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.local/bin/k3d
          key: ${{ runner.os }}-k3d-${{ hashFiles('./fleet/.github/scripts/install-k3d.sh') }}
          restore-keys: |
            ${{ runner.os }}-k3d-
      -
        name: Install k3d
        run: |
          if [ "${{ steps.cache-k3d.outputs.cache-hit }}" != "true" ]; then
            ./fleet/.github/scripts/install-k3d.sh
          else
            echo "Using cached k3d"
            chmod +x ~/.local/bin/k3d
          fi

      -
        name: Set up k3d control-plane cluster
        run: |
          k3d cluster create upstream --wait \
            -p "80:80@agent:0:direct" \
            -p "443:443@agent:0:direct" \
            --api-port 6443 \
            --agents 1 \
            --k3s-arg '--kubelet-arg=eviction-hard=imagefs.available<1%,nodefs.available<1%@agent:*' \
            --k3s-arg '--kubelet-arg=eviction-minimum-reclaim=imagefs.available=1%,nodefs.available=1%@agent:*' \
            --network "nw01" \
            --image docker.io/rancher/k3s:${{ env.SETUP_K3S_VERSION }} \
            --k3s-arg "--cluster-init@server:0"

      -
        name: Set up k3d downstream cluster
        run: |
          k3d cluster create downstream --wait \
            -p "81:80@agent:0:direct" \
            -p "444:443@agent:0:direct" \
            --api-port 6644 \
            --agents 1 \
            --k3s-arg '--kubelet-arg=eviction-hard=imagefs.available<1%,nodefs.available<1%@agent:*' \
            --k3s-arg '--kubelet-arg=eviction-minimum-reclaim=imagefs.available=1%,nodefs.available=1%@agent:*' \
            --network "nw01" \
            --image docker.io/rancher/k3s:${{ env.SETUP_K3S_VERSION }} \
            --k3s-arg "--cluster-init@server:0"

      -
        name: Set up latest Rancher
        run: |
          set -x

          charts_repo=${{ needs.release-against-test-charts.outputs.charts_repo }}
          charts_branch=${{ needs.release-against-test-charts.outputs.target_branch }}
          fleet_version=999.9.9+up9.9.9

          kubectl config use-context k3d-upstream

          ip=""
          while [ -z "$ip" ]; do
            ip=$(kubectl get service -n kube-system traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
            if [ -z "$ip" ]; then
              echo "Waiting for traefik load balancer ingress..."
              sleep 3
            fi
          done

          helm repo add jetstack https://charts.jetstack.io
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --set extraArgs[0]=--enable-certificate-owner-ref=true

          kubectl wait --for=condition=Available deployment --timeout=2m -n cert-manager --all

          helm repo add rancher-latest https://releases.rancher.com/server-charts/latest
          # set CATTLE_SERVER_URL and CATTLE_BOOTSTRAP_PASSWORD to get rancher out of "bootstrap" mode
          helm upgrade rancher rancher-latest/rancher \
            --install --wait \
            --devel \
            --create-namespace \
            --namespace cattle-system \
            --set replicas=1 \
            --set hostname=$ip.sslip.io \
            --set bootstrapPassword=admin \
            --set agentTLSMode=system-store \
            --set "extraEnv[0].name=CATTLE_CHART_DEFAULT_URL" \
            --set "extraEnv[0].value=https://github.com/${charts_repo}" \
            --set "extraEnv[1].name=CATTLE_CHART_DEFAULT_BRANCH" \
            --set "extraEnv[1].value=${charts_branch}" \
            --set "extraEnv[2].name=CATTLE_FLEET_VERSION" \
            --set "extraEnv[2].value=${fleet_version}" \
            --set "extraEnv[3].name=CATTLE_SERVER_URL" \
            --set "extraEnv[3].value=https://$ip.sslip.io" \
            --set-string fleet.extraEnv[0].name=EXPERIMENTAL_COPY_RESOURCES_DOWNSTREAM \
            --set-string fleet.extraEnv[0].value=true

          # wait for deployment of rancher
          kubectl -n cattle-system rollout status deploy/rancher

          # wait for rancher to create fleet namespace, deployment and controller
          until kubectl get deployments -n cattle-fleet-system | grep -q "fleet"; do sleep 3; done
          kubectl -n cattle-fleet-system rollout status deploy/fleet-controller

          until kubectl get bundles -n fleet-local | grep -q "fleet-agent-local.*1/1"; do sleep 3; done

          # wait for deployment of webhook, needed by tests
          until kubectl get deployments -n cattle-system | grep -q "rancher-webhook"; do sleep 3; done
          kubectl -n cattle-system rollout status deploy/rancher-webhook

          helm list -A

      -
        name: Checkout rancher/rancher
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          repository: rancher/rancher
          ref: main
          path: rancher

      -
        name: Rancher Provisioning Tests
        run: |
          cd rancher
          k8s_version=${{ env.SETUP_K3S_VERSION }}
          export SOME_K8S_VERSION=${k8s_version/-/+}
          go test -v -count=1 ./tests/v2prov/tests/fleet

      -
        name: Register Rancher's downstream clusters
        run: |
          until kubectl get service -n kube-system traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}'; do sleep 3; done
          ip=$(kubectl get service -n kube-system traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          export PATH=~/.local/bin:$PATH
          export public_hostname=$ip.sslip.io

          cd fleet
          ./.github/scripts/wait-for-loadbalancer.sh
          ./.github/scripts/register-downstream-clusters.sh

          # wait for cluster to settle
          sleep 30

          ./.github/scripts/label-downstream-cluster.sh

      -
        name: E2E tests for examples
        env:
          FLEET_E2E_NS: fleet-local
          FLEET_E2E_NS_DOWNSTREAM: fleet-default
        run: |
          kubectl config use-context k3d-upstream
          cd fleet
          ginkgo --github-output --trace e2e/acceptance/single-cluster-examples

          export CI_REGISTERED_CLUSTER=$(kubectl get clusters.fleet.cattle.io -n $FLEET_E2E_NS_DOWNSTREAM -o jsonpath='{..name}')

          ginkgo --github-output --trace e2e/multi-cluster

      -
        name: Dump Failed Downstream Environment
        if: failure()
        run: |
          kubectl config use-context k3d-downstream
          crust-gather collect --exclude-namespace=kube-system --exclude-kind=Lease --duration=5s -f tmp/downstream

      -
        name: Upload logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: gha-fleet-rancher-logs-${{ github.sha }}-${{ github.run_id }}
          path: |
            tmp/downstream
            tmp/upstream
          retention-days: 2
