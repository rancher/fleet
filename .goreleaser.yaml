---
version: 2

project_name: fleet

env:
  - CGO_ENABLED=0
  - GOWORK=off
  - IS_HOTFIX={{ if isEnvSet "IS_HOTFIX"}}{{ .Env.IS_HOTFIX }}{{else}}false{{end}}

release:
  prerelease: auto
  disable: "{{ .Env.IS_HOTFIX }}"
  extra_files:
    - glob: .charts/*.tgz

checksum:
  extra_files:
    - glob: .charts/*.tgz

changelog:
  disable: false
  use: github-native

before:
  hooks:
    - go mod download
    - bash .github/scripts/package-charts.sh {{ .Tag }} {{ .Version }}

archives:
  - id: fleet-controller
    formats: [ "binary" ]
    name_template: "{{ .Binary }}"
    ids:
      - fleet-controller

  - id: fleet-agent
    formats: [ "binary" ]
    name_template: "{{ .Binary }}"
    ids:
      - fleet-agent

  - id: fleet-cli
    formats: [ "binary" ]
    name_template: "{{ .Binary }}"
    ids:
      - fleet-cli

  - id: fleet-benchmark
    formats: [ "binary" ]
    name_template: "{{ .Binary }}"
    ids:
      - fleet-benchmark

builds:
  -
    id: fleet-controller
    main: ./cmd/fleetcontroller
    binary: fleetcontroller-{{ .Os }}-{{ .Arch }}{{ if .Arm }}64{{ end }}
    no_unique_dist_dir: true
    ldflags:
      - -w -s
      - -X github.com/rancher/fleet/pkg/version.GitCommit={{ .Commit }}
      - -X github.com/rancher/fleet/pkg/version.Version={{ .Tag }}
    targets:
    - linux_amd64_v1
    - linux_arm64
  -
    id: fleet-agent
    main: ./cmd/fleetagent
    binary: fleetagent-{{ .Os }}-{{ .Arch }}{{ if .Arm }}64{{ end }}
    no_unique_dist_dir: true
    ldflags:
      - -w -s
      - -X github.com/rancher/fleet/pkg/version.GitCommit={{ .Commit }}
      - -X github.com/rancher/fleet/pkg/version.Version={{ .Tag }}
    targets:
    - linux_amd64_v1
    - linux_arm64
    - windows_amd64
  -
    id: fleet-cli
    main: ./cmd/fleetcli
    binary: fleet-{{ .Os }}-{{ .Arch }}{{ if .Arm }}64{{ end }}
    no_unique_dist_dir: true
    ldflags:
      - -w -s
      - -X github.com/rancher/fleet/pkg/version.GitCommit={{ .Commit }}
      - -X github.com/rancher/fleet/pkg/version.Version={{ .Tag }}
    targets:
    - darwin_arm64
    - linux_amd64_v1
    - linux_arm64
    - windows_amd64
  -
    id: fleet-benchmark
    main: ./benchmarks/cmd
    binary: fleet-benchmark-{{ .Os }}-{{ .Arch }}{{ if .Arm }}64{{ end }}
    no_unique_dist_dir: true
    ldflags:
      - -w -s
      - -X github.com/rancher/fleet/pkg/version.GitCommit={{ .Commit }}
      - -X github.com/rancher/fleet/pkg/version.Version={{ .Tag }}
    targets:
    - darwin_arm64
    - linux_amd64_v1
    - linux_arm64
    - windows_amd64

dockers_v2:
  # Public fleet-controller images
  -
    id: fleet-public
    disable: "{{ .Env.IS_HOTFIX }}"
    ids: &fleet_controller_ids
    - fleet-controller
    - fleet-cli
    images:
    - "docker.io/rancher/fleet"
    tags: &docker_tags
    - "{{ .Tag }}"
    dockerfile: package/Dockerfile
    labels: &docker_labels
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "https://github.com/rancher/fleet"
    build_args: &docker_build_args
      BUILD_ENV: "goreleaser"
    flags: &public_docker_flags
    - "--pull"
    platforms: &docker_platforms
    - linux/amd64
    - linux/arm64

  # Public fleet-agent images
  -
    id: fleet-agent-public
    disable: "{{ .Env.IS_HOTFIX }}"
    ids: &fleet_agent_ids
    - fleet-agent
    images:
    - "docker.io/rancher/fleet-agent"
    tags: *docker_tags
    dockerfile: package/Dockerfile.agent
    labels: *docker_labels
    build_args: *docker_build_args
    flags: *public_docker_flags
    platforms: *docker_platforms

  # Staging fleet-controller images with provenance
  -
    id: fleet-private
    ids: *fleet_controller_ids
    images:
    - "{{ .Env.STAGE_REGISTRY }}/rancher/fleet"
    tags: *docker_tags
    dockerfile: package/Dockerfile
    labels: *docker_labels
    build_args: *docker_build_args
    flags: &private_docker_flags
    - "--pull"
    - "--sbom=true"
    - "--provenance=true"
    - "--provenance=mode=max"
    platforms: *docker_platforms

  # Staging fleet-agent images with provenance
  -
    id: fleet-agent-private
    ids: *fleet_agent_ids
    images:
    - "{{ .Env.STAGE_REGISTRY }}/rancher/fleet-agent"
    tags: *docker_tags
    dockerfile: package/Dockerfile.agent
    labels: *docker_labels
    build_args: *docker_build_args
    flags: *private_docker_flags
    platforms: *docker_platforms

docker_digest:
  name_template: "digests.txt"

docker_signs:
  - id: prime-fleet
    cmd: cosign
    args:
      - "sign"
      - "--oidc-provider=github-actions"
      - "--yes"
      - "--sign-container-identity={{ .Env.PRIME_REGISTRY }}/rancher/fleet:{{ .Tag }}"
      - "${artifact}@${digest}"
    ids:
      - fleet-private

  - id: prime-fleet-agent
    cmd: cosign
    args:
      - "sign"
      - "--oidc-provider=github-actions"
      - "--yes"
      - "--sign-container-identity={{ .Env.PRIME_REGISTRY }}/rancher/fleet-agent:{{ .Tag }}"
      - "${artifact}@${digest}"
    ids:
      - fleet-agent-private