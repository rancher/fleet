metadata:
  name: driven-helm-chart
  namespace: fleet-local
spec:
  repo: https://github.com/rancher/fleet-test-data
  bundles:
  - base: driven/helm-chart
  - base: driven/simple
  - base: driven/kustomize
    options: dev.yaml
  - base: driven/kustomize
    options: test.yaml
